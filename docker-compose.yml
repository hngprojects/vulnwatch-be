services:
  api:
    build:
      context: ./api-dotnet
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - postgres
      - redis
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=vulnwatch;Username=postgres;Password=password
      - Redis__Configuration=redis:6379

  worker:
    build:
      context: ./worker-java
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=vulnwatch
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
