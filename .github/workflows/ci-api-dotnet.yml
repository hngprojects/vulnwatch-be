name: CI — API (C#/.NET)

on:
  pull_request:
    branches:
      - dev
      - staging
      - prod
    paths:
      - "api-dotnet/**"
      - ".github/workflows/ci-api-dotnet.yml"
  push:
    branches:
      - dev
      - staging

concurrency:
  group: ci-dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vulnwatch_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api-dotnet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore
        continue-on-error: false

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=vulnwatch_test;Username=postgres;Password=password"
          Redis__Configuration: "localhost:6379"
          Jwt__SecretKey: ${{ secrets.JWT_SECRET_KEY_TEST }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: dotnet

  # Required status check gate — branch protection looks for this job name
  build_lint_test:
    name: build_lint_test
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - run: echo "✅ API CI passed"
