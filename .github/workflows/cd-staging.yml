name: CD — Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  # ─── Build C# API artifact ────────────────────────────────────────────────
  build-api:
    name: Build API (C#)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Restore & publish
        run: |
          dotnet restore api-dotnet
          dotnet publish api-dotnet/src/Web/Web.csproj \
            --configuration Release \
            --output ./artifacts/api \
            --no-restore

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: artifacts/api/
          retention-days: 1

  # ─── Build Java Worker artifact ───────────────────────────────────────────
  build-worker:
    name: Build Worker (Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Package JAR
        run: |
          cd worker-java
          ./mvnw package -DskipTests --no-transfer-progress
          mkdir -p ../artifacts/worker
          mv target/*.jar ../artifacts/worker/vulnwatch-worker.jar

      - name: Upload Worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-artifact
          path: artifacts/worker/
          retention-days: 1

  # ─── Deploy both artifacts to staging server ──────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [build-api, build-worker]

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-artifact
          path: artifacts/api

      - name: Download Worker artifact
        uses: actions/download-artifact@v4
        with:
          name: worker-artifact
          path: artifacts/worker

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Upload API build to staging server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/api/ \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}:/opt/vulnwatch/api/

      - name: Upload Worker JAR to staging server
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/worker/vulnwatch-worker.jar \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}:/opt/vulnwatch/worker/vulnwatch-worker.jar

      - name: Restart services on staging server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            echo "── Restarting API service ──"
            sudo systemctl restart vulnwatch-api
            sleep 3
            sudo systemctl is-active --quiet vulnwatch-api \
              && echo "API ✅" \
              || (echo "API ❌ — journalctl -u vulnwatch-api -n 50" && exit 1)

            echo "── Restarting Worker service ──"
            sudo systemctl restart vulnwatch-worker
            sleep 3
            sudo systemctl is-active --quiet vulnwatch-worker \
              && echo "Worker ✅" \
              || (echo "Worker ❌ — journalctl -u vulnwatch-worker -n 50" && exit 1)
          EOF

      - name: Notify deployment success
        if: success()
        run: echo "✅ Staging deployment succeeded — commit ${{ github.sha }}"
        # Replace with Slack/Discord webhook if needed

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Staging deployment FAILED — commit ${{ github.sha }}"
        # Replace with Slack/Discord webhook if needed
