name: CD Pipeline

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set Environment Variables
        id: set-env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
            echo "DEPLOY_DIR=/var/www/backend-production" >> $GITHUB_ENV
            echo "BRANCH=main" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "DEPLOY_DIR=/var/www/backend-staging" >> $GITHUB_ENV
            echo "BRANCH=staging" >> $GITHUB_ENV
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          envs: ENV_NAME,DEPLOY_DIR,BRANCH
          script: |
            # 1. Pull latest code
            cd $DEPLOY_DIR
            git pull origin $BRANCH
            
            # 2. Build and restart the .NET API
            cd api-dotnet/src/Web
            dotnet publish -c Release -o $DEPLOY_DIR/publish
            pm2 restart api-$ENV_NAME
            
            # 3. Build and restart the Java Worker
            cd $DEPLOY_DIR/worker-java
            ./mvnw clean package -DskipTests
            pm2 restart worker-$ENV_NAME
