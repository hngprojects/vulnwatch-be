name: CD — Dev (ECS)

on:
  push:
    branches:
      - dev

concurrency:
  group: cd-dev
  cancel-in-progress: false

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 012834916544.dkr.ecr.eu-north-1.amazonaws.com
  ECR_REPOSITORY: vulnwatch
  ECS_CLUSTER: genderize-cluster
  ECS_SERVICE_API: vulnwatch-api
  TASK_DEFINITION_API: vulnwatch-api-task

jobs:
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api-dotnet
          dockerfile: ./api-dotnet/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:api-dev-${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:api-dev-latest
          cache-from: type=gha,scope=api-dev
          cache-to: type=gha,mode=max,scope=api-dev

  deploy-api:
    name: Deploy API to ECS (Dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_API }} \
            --query taskDefinition \
            > task-def-api.json

      - name: Inject new API image
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: vulnwatch-api
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:api-dev-${{ github.sha }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true